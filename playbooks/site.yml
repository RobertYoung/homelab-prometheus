---
- name: Prometheus server configuration
  hosts: prometheus
  vars:
    hostname: prometheus
    domain: local.iamrobertyoung.co.uk
    fqdn: "{{ hostname }}.{{ domain }}"

  roles:
    - role: configure-system
      tags: [configure-system]

    - role: shell
      tags: [shell]
      vars:
        shell_hostname: "{{ hostname }}"
        shell_user: noxious
        shell_home_directory: /home/noxious

    - role: shell
      tags: [shell]
      vars:
        shell_hostname: "{{ hostname }}"
        shell_user: root
        shell_home_directory: /root
        shell_show_pretty_info: false

    - role: docker
      tags: [docker]

    - role: telegraf
      tags: [telegraf]
      vars:
        telegraf_influxdb_url: "https://influxdb.{{ domain }}"
        telegraf_influxdb_port: 8086
        telegraf_influxdb_organisation: "0dd8df669872ba9e"
        telegraf_influxdb_token: "{{ lookup('amazon.aws.aws_ssm', '/homelab/influxdb/token', region='eu-west-1') }}"
        telegraf_influxdb_bucket: "home-server"

    - role: step-ca-client
      tags: [step-ca-client]
      vars:
        step_ca_client_provisioner_password: "{{ lookup('amazon.aws.aws_ssm', '/homelab/step-ca/ansible-password', region='eu-west-1') }}"
        step_ca_client_cert_not_after: "168h" # 7 days
        step_ca_client_post_renew_commands:
          - "docker kill --signal=HUP traefik || echo 'Traefik not running, skipping HUP signal'"

    - role: syslog
      tags: [syslog]
      vars:
        syslog_fqdn: "{{ fqdn }}"

    - role: wazuh-agent
      tags: [wazuh-agent]

    - role: certbot
      tags: [certbot]
      vars:
        certbot_domain: "{{ fqdn }}"
        certbot_aws_access_key: "{{ lookup('amazon.aws.aws_ssm', '/homelab/certbot/access-key', region='eu-west-1') }}"
        certbot_aws_secret_access_key: "{{ lookup('amazon.aws.aws_ssm', '/homelab/certbot/secret-access-key', region='eu-west-1') }}"

    - role: prometheus
      tags: [prometheus]
